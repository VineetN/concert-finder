[tool.uv.workspace]
members = [
    "apps/api",
    "packages/ingest",
    "packages/scoring",
    "packages/shared",
    "worker",
]

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["apps", "packages", "worker"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
ignore = ["E501"]

[tool.pyright]
pythonVersion = "3.11"
typeCheckingMode = "basic"
venvPath = "."
venv = ".venv"

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-httpx>=0.36.2",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
