[project]
name = "concert-finder-scoring"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "concert-finder-shared",
    "sentence-transformers>=3.0",
    "hdbscan>=0.8",
    "umap-learn>=0.5",
    "numpy>=1.26",
    "scikit-learn>=1.5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/concert_finder_scoring"]

[tool.uv.sources]
concert-finder-shared = { workspace = true }
