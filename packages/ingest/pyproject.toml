[project]
name = "concert-finder-ingest"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "concert-finder-shared",
    "concert-finder-scoring",
    "httpx>=0.27",
    "selectolax>=0.3",
    "tenacity>=8.3",
]

[project.optional-dependencies]
# Only install if a venue's scraper sets requires_js = True
js = ["playwright>=1.44"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/concert_finder_ingest"]

[tool.uv.sources]
concert-finder-shared = { workspace = true }
concert-finder-scoring = { workspace = true }
